<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DGcorp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Space Explorer</h1>
    <p>API Integration and Service Architecture.</p>
  </header>

  <main>
    <section class="card">
      <h2>NASA APOD</h2>
      <button id="apodButton">Ver imagen del dia</button>
      <div id="apodResult" class="result"></div>
    </section>

    <section class="card">
      <h2>Videos de YouTube</h2>
      <div class="form-row">
        <input id="videoInput" type="text" placeholder="NASA, Mars, SpaceX, Galaxy">
        <button id="videoButton">Buscar</button>
      </div>
      <div id="videoResult" class="result"></div>
    </section>

    <section class="card">
      <h2>Publicaciones de Mastodon</h2>
      <div class="form-row">
        <input id="mastodonInput" type="text" placeholder="NASA, Space, Astronomy, Galaxy">
        <button id="mastodonButton">Buscar</button>
      </div>
      <div id="mastodonResult" class="result"></div>
    </section>

    <section class="card">
      <h2>Mapa de lugares astronomicos</h2>
      <button id="placesButton">Buscar lugares</button>
      <div id="placesResult" class="result"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
